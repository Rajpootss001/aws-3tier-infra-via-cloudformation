AWSTemplateFormatVersion: '2010-09-09'

Resources:
  EIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  NAT:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt EIP.AllocationId
      SubnetId: !Select [0, !Split [",", !ImportValue PublicSubnets]]

Outputs:
  NATId:
    Value: !Ref NAT
    Export:
      Name: NATId